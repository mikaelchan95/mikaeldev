# Netlify build configuration
# Continuous deploy: connect this repo in the Netlify UI (or `netlify init`) and
# every push builds + publishes automatically. Manual: `netlify deploy --prod`.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# SPA-style: this is a single page, so send any unknown path to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache the hashed, immutable build assets.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
